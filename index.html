<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Zenganinzans</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        canvas {
            background-color: #1a1a1a;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            cursor: crosshair;
        }
        #gameover {
            display: none;
            position: absolute;
            font-size: 48px;
            color: #ff3333;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            text-align: center;
        }
        #restart {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            background: #ff3333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="ui">ZOMBIE ZENGANINZANS — Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="gameover">
        GAME OVER
        <br>
        <button id="restart" onclick="resetGame()">Try Again</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const gameoverEl = document.getElementById("gameover");

// Game State
let player = { x: 400, y: 300, size: 20, speed: 4, angle: 0 };
let bullets = [];
let zombies = [];
let keys = {};
let mouse = { x: 0, y: 0 };
let score = 0;
let gameOver = false;
let spawnRate = 1500; 
let lastSpawn = 0;

// Track Inputs
window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);
canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});
canvas.addEventListener("mousedown", () => {
    if (!gameOver) shoot();
});

function shoot() {
    let dx = mouse.x - player.x;
    let dy = mouse.y - player.y;
    let angle = Math.atan2(dy, dx);
    
    bullets.push({
        x: player.x,
        y: player.y,
        vx: Math.cos(angle) * 8,
        vy: Math.sin(angle) * 8,
        size: 4
    });
}

function spawnZombie() {
    let x, y;
    if (Math.random() < 0.5) {
        x = Math.random() < 0.5 ? -20 : canvas.width + 20;
        y = Math.random() * canvas.height;
    } else {
        x = Math.random() * canvas.width;
        y = Math.random() < 0.5 ? -20 : canvas.height + 20;
    }
    zombies.push({ x: x, y: y, size: 15, speed: 1.5 + Math.random() });
}

function update(time) {
    if (gameOver) return;

    // 1. Movement System
    if (keys['w'] || keys['arrowup']) player.y -= player.speed;
    if (keys['s'] || keys['arrowdown']) player.y += player.speed;
    if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
    if (keys['d'] || keys['arrowright']) player.x += player.speed;

    // Boundary constraints
    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

    // Player Rotation
    player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

    // 2. Shoot System (Bullets update)
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
        }
    }

    // Zombie Spawning
    if (time - lastSpawn > spawnRate) {
        spawnZombie();
        lastSpawn = time;
        if (spawnRate > 500) spawnRate -= 10; 
    }

    // Zombie AI & Collisions
    for (let i = zombies.length - 1; i >= 0; i--) {
        let z = zombies[i];
        let dx = player.x - z.x;
        let dy = player.y - z.y;
        let dist = Math.hypot(dx, dy);

        // Move toward player
        z.x += (dx / dist) * z.speed;
        z.y += (dy / dist) * z.speed;

        // Player collision check
        if (dist < player.size + z.size) {
            gameOver = true;
            gameoverEl.style.display = "block";
        }

        // Bullet collision check
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            let bDist = Math.hypot(b.x - z.x, b.y - z.y);
            if (bDist < z.size + b.size) {
                zombies.splice(i, 1);
                bullets.splice(j, 1);
                score += 10;
                scoreEl.innerText = score;
                break;
            }
        }
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = "#3388ff";
    ctx.beginPath();
    ctx.arc(0, 0, player.size, 0, Math.PI * 2);
    ctx.fill();
    // Gun pointer
    ctx.fillStyle = "#555";
    ctx.fillRect(0, -4, 25, 8);
    ctx.restore();

    // Draw Bullets
    ctx.fillStyle = "#ffcc00";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // Draw Zombies
    ctx.fillStyle = "#a83232";
    zombies.forEach(z => {
        ctx.beginPath();
        ctx.arc(z.x, z.y, z.size, 0, Math.PI * 2);
        ctx.fill();
        // Zombie eyes
        ctx.fillStyle = "#fff";
        ctx.fillRect(z.x - 3, z.y - 3, 2, 2);
        ctx.fillRect(z.x + 1, z.y - 3, 2, 2);
        ctx.fillStyle = "#a83232";
    });
}

function loop(time) {
    update(time);
    render();
    requestAnimationFrame(loop);
}

function resetGame() {
    player = { x: 400, y: 300, size: 20, speed: 4, angle: 0 };
    bullets = [];
    zombies = [];
    score = 0;
    spawnRate = 1500;
    gameOver = false;
    scoreEl.innerText = score;
    gameoverEl.style.display = "none";
}

// Start game
requestAnimationFrame(loop);
</script>

</body>
</html>
